<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÚRÚ – Detail dokumentu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* Document detail specific styles */
        .doc-detail { padding: 40px 0 60px; }
        .doc-detail-grid {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 32px;
        }
        .doc-detail-main h1 {
            font-size: 1.8rem;
            color: var(--cz-blue);
            margin-bottom: 16px;
            font-weight: 700;
            line-height: 1.3;
        }
        .doc-detail-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--gray-200);
        }
        .meta-item {
            font-size: 0.85rem;
            color: var(--gray-500);
        }
        .meta-item strong {
            color: var(--gray-700);
            display: block;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 2px;
        }
        .doc-body {
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--gray-700);
        }
        .doc-body h2 {
            font-size: 1.2rem;
            color: var(--cz-blue);
            margin: 28px 0 12px;
            font-weight: 700;
        }
        .doc-body p { margin-bottom: 14px; }

        /* Sidebar */
        .sidebar-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            padding: 24px;
            margin-bottom: 20px;
        }
        .sidebar-card h3 {
            font-size: 0.85rem;
            color: var(--cz-blue);
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--cz-blue);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 700;
        }
        .download-btn {
            display: block;
            padding: 14px 20px;
            background: var(--cz-red);
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 10px;
            transition: var(--transition);
        }
        .download-btn:hover { background: var(--cz-red-dark); }
        .download-btn.secondary {
            background: var(--cz-blue);
        }
        .download-btn.secondary:hover { background: var(--cz-blue-dark); }
        .download-btn.green {
            background: #027a48;
        }
        .download-btn.green:hover { background: #015c36; }
        .related-item {
            padding: 12px 0;
            border-bottom: 1px solid var(--gray-100);
        }
        .related-item:last-child { border-bottom: none; }
        .related-item a {
            color: var(--cz-blue);
            text-decoration: none;
            font-size: 0.87rem;
            font-weight: 500;
        }
        .related-item a:hover { text-decoration: underline; }
        .related-item .related-meta {
            font-size: 0.75rem;
            color: var(--gray-400);
            margin-top: 2px;
        }

        @media (max-width: 768px) {
            .doc-detail-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="site-header"></div>

<div class="container">
    <div class="breadcrumb">
        <a href="../index.html">Úvod</a> &rsaquo;
        <a href="../index.html">Metodická podpora</a> &rsaquo;
        <strong>Detail dokumentu</strong>
    </div>
</div>

<section class="doc-detail">
    <div class="container">
        <div class="doc-detail-grid">
            <div class="doc-detail-main" id="doc-main">
                <p class="loading-msg">Načítání dokumentu...</p>
            </div>
            <div class="doc-detail-sidebar" id="doc-sidebar">
            </div>
        </div>
    </div>
</section>

<div id="site-footer"></div>
<div id="site-chatbot"></div>

<script src="../js/components.js"></script>
<script src="../js/main.js"></script>
<script>
(function() {
    const params = new URLSearchParams(window.location.search);
    const docId = parseInt(params.get('id'));
    if (!docId) {
        document.getElementById('doc-main').innerHTML = '<p>Dokument nebyl nalezen.</p>';
        return;
    }

    fetch('../data/documents.json')
        .then(r => r.json())
        .then(data => {
            const docs = data.documents || [];
            const doc = docs.find(d => d.id === docId);
            if (!doc) {
                document.getElementById('doc-main').innerHTML = '<p>Dokument nebyl nalezen.</p>';
                return;
            }

            // Format date
            function fmtDate(iso) {
                if (!iso) return '';
                const d = new Date(iso);
                return d.toLocaleDateString('cs-CZ', { day: 'numeric', month: 'numeric', year: 'numeric' });
            }

            const statusLabels = { 'platne': 'Platné', 'nahrazene': 'Nahrazeno', 'zrusene': 'Zrušené' };

            // --- MAIN CONTENT ---
            const tags = (doc.tags || []).map(t => `<span class="doc-tag">${t}</span>`).join('');
            document.getElementById('doc-main').innerHTML = `
                <div class="doc-tags" style="margin-bottom: 14px;">${tags}</div>
                <h1>${doc.title}</h1>
                <div class="doc-detail-meta">
                    <div class="meta-item">
                        <strong>Datum vydání</strong>
                        ${fmtDate(doc.date)}
                    </div>
                    ${doc.dateUpdated ? `<div class="meta-item"><strong>Aktualizace</strong>${fmtDate(doc.dateUpdated)}</div>` : ''}
                    <div class="meta-item">
                        <strong>Typ</strong>
                        ${doc.type || ''}
                    </div>
                    <div class="meta-item">
                        <strong>Autor</strong>
                        ${doc.author || ''}
                    </div>
                    <div class="meta-item">
                        <strong>Platnost</strong>
                        <span class="doc-status ${doc.status}" style="display:inline-block;">${statusLabels[doc.status] || doc.status}</span>
                    </div>
                </div>
                <div class="doc-body">
                    <p>${doc.excerpt || ''}</p>
                    ${doc.sourceUrl ? `<p style="margin-top:20px;"><a href="${doc.sourceUrl}" target="_blank" style="color:var(--cz-blue); font-weight:500;">Zobrazit na stránkách ÚÚR &rarr;</a></p>` : ''}
                </div>
            `;

            // Update page title
            document.title = `ÚRÚ – ${doc.title}`;

            // --- SIDEBAR ---
            let sidebarHTML = '<div class="sidebar-card"><h3>Ke stažení</h3>';

            if (doc.pdfFile) {
                const sizeStr = doc.pdfSize ? ` (${doc.pdfSize})` : '';
                sidebarHTML += `<a href="../${doc.pdfFile}" class="download-btn" target="_blank">Stáhnout PDF${sizeStr}</a>`;
            }
            if (doc.infographic) {
                sidebarHTML += `<a href="../${doc.infographic}" class="download-btn green" target="_blank">Infografika</a>`;
            }
            if (doc.videoFile) {
                sidebarHTML += `<a href="../${doc.videoFile}" class="download-btn secondary" target="_blank">Video výklad (MP4)</a>`;
            } else if (doc.videoId) {
                sidebarHTML += `<a href="video.html?id=${doc.videoId}" class="download-btn secondary">Video výklad</a>`;
            }
            if (doc.sourceUrl) {
                sidebarHTML += `<a href="${doc.sourceUrl}" class="download-btn" style="background:var(--gray-600);" target="_blank">Zdroj – ÚÚR</a>`;
            }

            sidebarHTML += '</div>';

            // Related documents
            if (doc.relatedIds && doc.relatedIds.length > 0) {
                sidebarHTML += '<div class="sidebar-card"><h3>Související dokumenty</h3>';
                doc.relatedIds.forEach(rid => {
                    const rel = docs.find(d => d.id === rid);
                    if (rel) {
                        sidebarHTML += `
                            <div class="related-item">
                                <a href="document.html?id=${rel.id}">${rel.title}</a>
                                <div class="related-meta">${fmtDate(rel.date)} · ${rel.type || ''}</div>
                            </div>`;
                    }
                });
                sidebarHTML += '</div>';
            }

            document.getElementById('doc-sidebar').innerHTML = sidebarHTML;
        })
        .catch(err => {
            console.error('Chyba:', err);
            document.getElementById('doc-main').innerHTML = '<p>Nepodařilo se načíst dokument.</p>';
        });
})();
</script>

</body>
</html>
